networks:
  appnet:


volumes:
  pg_data:
  minio_data:


services:
  postgres:
    image: postgres:latest
    container_name: db-postgres
    environment:
      POSTGRES_DB: ${DB_PROD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_PROD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ appnet ]

  py-analyzer:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: py-analyzer
    ports:
      - ${PYTHON_PORT}:${PYTHON_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ appnet ]

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - ${MINIO_API_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio_data:/data
    networks: [ appnet ]

  spring-app:
    build:
      context: ./api
      dockerfile: ./Dockerfile
    container_name: spring-app
    environment:
      SERVER_PORT: ${SPRING_PORT}
      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_PROD}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      ANALYZER_BASE_URL: https://py-analyzer:8000
      STORAGE_ENABLED: ${STORAGE_ENABLED:-true}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-mlsuite-models}
      STORAGE_AUTO_CREATE_BUCKET: ${STORAGE_AUTO_CREATE_BUCKET:-true}
      STORAGE_BACKFILL_ON_STARTUP: ${STORAGE_BACKFILL_ON_STARTUP:-true}

      # OAuth, pass-through from your task env
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - ${SPRING_PORT}:${SPRING_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks: [ appnet ]

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      additional_contexts:
        mlform: ../mlform
    container_name: web-frontend
    environment:
      VITE_BACKEND_URL: https://localhost:${SPRING_PORT}
    volumes:
      - ./frontend/.cert/localhost.pem:/etc/nginx/certs/localhost.pem:ro
      - ./frontend/.cert/localhost-key.pem:/etc/nginx/certs/localhost-key.pem:ro
    ports:
      - ${WEB_PORT}:5173
    depends_on:
      spring-app:
        condition: service_started
    networks: [ appnet ]
